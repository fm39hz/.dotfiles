$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[¯é░](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
[¯é░](fg:color_bg3 bg:transparent)\
$line_break$character"""

add_newline = false
palette = 'everforest_dark'
scan_timeout = 30
command_timeout = 500

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[palettes.everforest_dark]
color_bg1 = "#d3c6aa"
color_fg0 = "#343f44"
color_bg3 = "#3d484d"
color_blue = "#7fbbb3"
color_aqua = "#83c092"
color_green = "#a7c080"
color_orange = '#e69875'
color_purple = "#d699b6"
color_red = "#e67e80"
color_yellow = "#dbbc7f"

[os]
disabled = false
style = "bg:color_bg3 fg:color_green bold"

[os.symbols]
Windows = "¾░ì▓"
Ubuntu = "¾░òê"
