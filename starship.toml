"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$username\
$hostname\
[¯é░](bg:color_yellow fg:color_green)\
$directory\
[¯é░](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
