# BEGIN_KITTY_FONTS
font_family      family='Iosevka Sans' postscript_name=Iosevka-Sans
font_size 15

disable_ligatures never

modify_font baseline -2
modify_font cell_height 3px
text_composition_strategy 1.2 15

box_drawing_scale 0.001, 1, 1.5, 2
# END_KITTY_FONTS

# --- Window Layout ---
placement_strategy center
resize_in_steps    yes
confirm_os_window_close 0
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# --- Color Scheme ---
background_opacity 0.5

# --- Advanced ---
term xterm-256color
allow_remote_control yes
listen_on unix:/tmp/mykitty

# --- Keyboard Shortcuts ---
map ctrl+shift+equal change_font_size all +0.1
map ctrl+shift+minus change_font_size all -0.2

# --- Theme ---
# BEGIN_KITTY_THEME
# Everforest Dark Hard
include current-theme.conf
# END_KITTY_THEME
