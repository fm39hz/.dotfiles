# BEGIN_KITTY_FONTS
font_family      family='Iosevka Sans' postscript_name=Iosevka-Sans
font_size 15

# Tắt bớt các ký tự ligature không cần thiết nếu muốn giống Ghostty (hoặc để 'never' như cũ nếu bạn thích)
disable_ligatures never

# --- Bí kíp để font đậm đà và sắc nét như Ghostty ---
# 1. Điều chỉnh text_composition_strategy: tăng độ tương phản và độ dày (gamma/thickness)
# Giá trị 1.7 30 giúp font dày lên đáng kể mà không bị nhòe.
text_composition_strategy 1.7 30

# 2. Bù đắp khoảng cách dòng (tương đương với adjust-cell-height = 2% bên Ghostty)
adjust_line_height 102%
# Ép Kitty render font mượt mà, không bị răng cưa và lệch chân chữ
hinting slight
# 3. Ép Kitty render font đậm hơn một chút bằng cách can thiệp vào font_hinting (tùy chọn nếu cần)
box_drawing_scale 0.001, 1, 1.5, 2
# END_KITTY_FONTS

# --- Window Layout ---
placement_strategy center
resize_in_steps    yes
confirm_os_window_close 0
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# --- Color Scheme ---
background_opacity 0.5

# --- Advanced ---
term xterm-256color
allow_remote_control yes
listen_on unix:/tmp/mykitty

# --- Keyboard Shortcuts ---
# Thay đổi kích thước font với bước nhảy nhỏ (0.1 và 0.2) theo config cũ của bạn
map ctrl+shift+equal change_font_size all +0.1
map ctrl+shift+minus change_font_size all -0.2

# --- Theme ---
# BEGIN_KITTY_THEME
# Everforest Dark Hard
include current-theme.conf
# END_KITTY_THEME
